<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flux Warehouse - Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1a2333 0%, #0a0c12 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .background-shapes {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      filter: blur(80px);
      opacity: 0.4;
      border-radius: 50%;
    }

    .shape-1 {
      top: -20%; left: -10%;
      width: 50vw; height: 50vw;
      background: rgba(0, 255, 136, 0.15);
      animation: float 10s ease-in-out infinite alternate;
    }

    .shape-2 {
      bottom: -20%; right: -10%;
      width: 40vw; height: 40vw;
      background: rgba(96, 165, 250, 0.15);
      animation: float 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(10%, 10%); }
    }

    .login-container {
      background: rgba(20, 26, 40, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      z-index: 1;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: translateY(20px);
      opacity: 0;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      to { transform: translateY(0); opacity: 1; }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #00ff88 0%, #0099ff 100%);
      border-radius: 16px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
    }

    .logo-icon svg {
      width: 30px;
      height: 30px;
      fill: #fff;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo-subtext {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 0.25rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      color: #fff;
      transition: all 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: #00ff88;
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
      background: rgba(15, 23, 42, 0.8);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(0, 255, 136, 0.2);
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 255, 136, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.visible {
      display: flex;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .hint {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
  </div>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-text">Flux Warehouse</div>
      <div class="logo-subtext">Digital Twin Portal</div>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      Invalid username or password
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button type="submit" class="btn-submit">Access System</button>
    </form>

    <div class="hint">
      Authorized personnel only.<br/>Default: admin / flux2024
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('flux_auth') === 'true') {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');

    // Simple client-side auth for demonstration
    const VALID_USERS = {
      'admin': 'flux2024',
      'operator': 'twin123'
    };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      errorMsg.classList.remove('visible');

      if (username && password && VALID_USERS[username] === password) {
        // Success
        sessionStorage.setItem('flux_auth', 'true');
        sessionStorage.setItem('flux_user', username);
        
        // Button loading state
        const btn = form.querySelector('button');
        btn.innerHTML = 'Authenticating...';
        btn.style.opacity = '0.8';
        
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } else {
        // Failure
        errorMsg.classList.add('visible');
        if (!username) usernameInput.focus();
        else if (!password) passwordInput.focus();
        else passwordInput.select();
      }
    });

    // Clear error on input
    usernameInput.addEventListener('input', () => errorMsg.classList.remove('visible'));
    passwordInput.addEventListener('input', () => errorMsg.classList.remove('visible'));
  </script>
</body>
</html>
